<!--tarea formulario de registro
para un sitio web para reservar una hora al doctor
Debe incluir: nombre del paciente, fecha de cita,
fecha de nacimiento, sintomas del paciente, ciudad (lista_desplegable),
lista desplegable-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tarea formulario</title>
</head>
<body>
    <form action="#" method="POST">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
        </div>
        <div>
            <label for="fechacit">Fecha de la cita:</label>
            <input type="datetime" id="fechacit" name="edad">
    </form>
</body>
</html>
